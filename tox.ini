[tox]
envlist =
    py{310,311}-django{42,52}
    py{312,313}-django{42,52,60}
    lint
    docs

[testenv]
deps =
    django42: Django>=4.2,<5.0
    django52: Django>=5.2,<6.0
    django60: Django>=6.0,<6.1
    djangorestframework>=3.14.0
    drf-yasg>=1.21.0
    django-filter>=23.0
    pytest
    pytest-django
    pytest-cov
    pytest-xdist
commands =
    pytest {posargs}

[testenv:lint]
deps =
    flake8
    black
    isort
    mypy
commands =
    flake8 turbodrf/
    black --check turbodrf/
    isort --check-only turbodrf/
    mypy turbodrf/
